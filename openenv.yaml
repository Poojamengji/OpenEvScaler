# Aegis Forensic IP: High-Fidelity Patent Infringement Audit Environment
version: "1.1"
name: "aegis-forensic-ip"
description: "Forensic analysis environment for intellectual property litigation, claim construction, and infringement auditing (Literal + DOE)."
entrypoint: "npm start"
env_vars:
  - PORT: 3000

tasks:
  - id: "forensic-claim-mapping"
    name: "Structural Claim Delineation"
    difficulty: "easy"
    description: "Audit the solar-capture system patent (US-1029384) to extract distinct independent claims for litigation scoping."
  
  - id: "forensic-limitation-audit"
    name: "Claim Limitation Extraction"
    difficulty: "medium"
    description: "Deep audit of US-1192837 (Surgical Haptic Interface). Identify all technical limitations required for a valid infringement claim."

  - id: "equivalence-forensics"
    name: "Doctrine of Equivalents (Non-Literal) Audit"
    difficulty: "hard"
    description: "Analyze the 'SafeSafe' hardware against US-1283746. Determine if LoraWAN protocols constitute a functional equivalent for WiFi limitations."

  - id: "sovereign-ip-strategy"
    name: "Multi-Staged Strategic Invalidation"
    difficulty: "elite"
    description: "Perform a complex IP audit on US-9928374. Assess both Literal Infringement and potential Prior Art invalidity based on network topology constraints."

observation_space:
  type: "object"
  properties:
    document_text:
      type: "string"
      description: "The technical patent manuscript or claim specification."
    task_description:
      type: "string"
      description: "Strategic forensic objective."
    history:
      type: "array"
      items:
        type: "string"
      description: "Log of forensic actions and auditor feedback."
    metadata:
      type: "object"
      properties:
        patent_number:
          type: "string"
        filing_date:
          type: "string"

action_space:
  type: "object"
  properties:
    action_type:
      type: "string"
      enum: ["scan_claims", "audit_limitations", "consult_legal_glossary", "query_prior_art_repo", "finalize_audit_report"]
    payload:
      type: "object"
      properties:
        claim_id:
          type: "integer"
        term:
          type: "string"
        identified_claims:
          type: "array"
          items:
            type: "integer"
        extracted_limitations:
          type: "array"
          items:
            type: "string"
        full_infringement_detected:
          type: "boolean"
        forensic_reasoning:
          type: "string"
